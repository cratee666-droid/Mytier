<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --bg-card: #2d2d2d;
            --text-primary: #e8e8e8;
            --text-secondary: #d97757;
            --text-muted: #777;
            --border-color: #3a3a3a;
            --bubble-friend: #2d2d2d;
            --bubble-friend-border: #3a3a3a;
            --input-bg: #2d2d2d;
            --sidebar-bg: #1e1e1e;
            --accent: #d97757;
            --accent-dark: #b85c3c;
            --search-bg: #1a1a1a;
            --search-item-hover: #333333;
            --modal-bg: rgba(0,0,0,0.85);
            --poll-bg: #2a2a2a;
            --poll-border: #3a3a3a;
            --poll-option-bg: #333333;
            --poll-option-hover: #3d3d3d;
            --poll-voted-bg: #3d2a1e;
            --scrollbar: #3a3a3a;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Chat Container ─── */
        .chat-container {
            flex: 1;
            padding: 16px;
            padding-bottom: 150px;
            overflow-y: auto;
            overflow-x: hidden;
            background: var(--bg-secondary);
            -webkit-overflow-scrolling: touch;
        }

        .message-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
            position: relative;
            clear: both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-group.own { align-items: flex-end; }

        .message-group.deleted {
            opacity: 0;
            height: 0;
            margin: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .message-group.own .message-header { flex-direction: row-reverse; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
            color: white;
        }

        .user-avatar   { background: linear-gradient(135deg, #d97757, #b85c3c); }
        .friend-avatar { background: linear-gradient(135deg, #667eea, #764ba2); }

        .sender-name  { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .message-time { font-size: 11px; color: var(--text-muted); }

        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.45;
            word-wrap: break-word;
            position: relative;
        }

        .message-group.own .message-bubble {
            background: linear-gradient(135deg, #d97757, #b85c3c);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-bubble.friend {
            background: var(--bubble-friend);
            color: var(--text-primary);
            border: 1px solid var(--bubble-friend-border);
            border-bottom-left-radius: 4px;
        }

        /* ─── Message Actions ─── */
        .message-actions {
            position: absolute;
            top: -4px;
            right: 0;
            display: none;
            z-index: 5;
        }

        .message-group.own:hover .message-actions { display: block; }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .delete-btn:hover { background: #dc2626; }

        /* ─── Input Area ─── */
        .input-container {
            padding: 10px 14px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .message-input {
            flex: 1;
            padding: 11px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 100px;
            min-height: 44px;
            overflow-y: auto;
            line-height: 1.4;
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(217,119,87,0.12);
        }

        .message-input::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: linear-gradient(135deg, #d97757, #b85c3c);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(217,119,87,0.35);
            transition: all 0.2s;
        }

        .send-btn:hover  { box-shadow: 0 4px 14px rgba(217,119,87,0.45); transform: translateY(-1px); }
        .send-btn:active { transform: scale(0.94); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        .tool-btn {
            width: 44px;
            height: 44px;
            border: 1.5px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-muted);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .tool-btn:hover  { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }
        .tool-btn:active { transform: scale(0.94); }
        .tool-btn svg    { display: block; }

        /* ─── Sidebar ─── */
        .sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 280px;
            background: var(--sidebar-bg);
            box-shadow: 4px 0 24px var(--shadow);
            z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            flex-direction: column;
            padding: 28px 20px 24px;
        }

        .sidebar.open { transform: translateX(0); }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: var(--modal-bg);
            z-index: 1999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .sidebar-overlay.open { opacity: 1; pointer-events: auto; }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d97757, #b85c3c);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .sidebar-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-online {
            font-size: 12px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .online-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
        }

        .sidebar-menu { display: flex; flex-direction: column; gap: 4px; }

        .sidebar-item {
            padding: 11px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: background 0.15s;
            text-decoration: none;
        }

        .sidebar-item:hover { background: var(--search-item-hover); }
        .sidebar-item.danger { color: #ef4444; }
        .sidebar-item.danger:hover { background: rgba(239,68,68,0.1); }
        .sidebar-item svg { flex-shrink: 0; }

        .sidebar-spacer { flex: 1; }

        /* ─── Login Modal ─── */
        .login-modal {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .login-modal.hidden { display: none; }

        .login-box {
            background: var(--bg-card);
            padding: 40px 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 40px var(--shadow);
            animation: slideUp 0.35s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #d97757, #b85c3c);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 16px rgba(217,119,87,0.4);
        }

        .login-title    { font-size: 26px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
        .login-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }

        .login-input {
            width: 100%;
            padding: 13px 18px;
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            margin-bottom: 16px;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(217,119,87,0.12);
        }

        .login-input::placeholder { color: var(--text-muted); }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d97757, #b85c3c);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(217,119,87,0.35);
            transition: all 0.2s;
        }

        .login-btn:hover  { box-shadow: 0 6px 18px rgba(217,119,87,0.45); transform: translateY(-1px); }
        .login-btn:active { transform: scale(0.98); }

        /* ─── Empty State ─── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon { margin-bottom: 14px; opacity: 0.4; }
        .empty-text { font-size: 15px; color: var(--text-muted); line-height: 1.6; }

        /* ─── Search Modal ─── */
        .search-modal {
            position: fixed;
            inset: 0;
            background: var(--modal-bg);
            z-index: 3000;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .search-modal.open { opacity: 1; pointer-events: auto; }

        .search-sheet {
            width: 100%;
            background: var(--bg-card);
            border-radius: 20px 20px 0 0;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden;
        }

        .search-modal.open .search-sheet { transform: translateY(0); }

        .search-handle {
            width: 36px; height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 12px auto 0;
            flex-shrink: 0;
        }

        .search-header {
            padding: 14px 18px 16px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .search-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 14px;
        }

        .search-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .search-tab {
            flex: 1;
            padding: 8px 6px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .search-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .search-tab svg { flex-shrink: 0; }

        .search-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--input-bg);
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            padding: 10px 14px;
            transition: border-color 0.2s;
        }

        .search-input-row:focus-within { border-color: var(--accent); }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .clear-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            display: none;
            padding: 0;
            line-height: 1;
        }

        .clear-btn:hover { color: var(--text-primary); }

        /* ─── Search hint ─── */
        .search-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        .search-hint kbd {
            background: var(--border-color);
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 5px;
            font-size: 11px;
            font-family: inherit;
        }

        .search-results {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .search-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
            gap: 14px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .search-spinner {
            width: 30px; height: 30px;
            border: 2.5px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .search-empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .search-empty-icon { margin-bottom: 12px; opacity: 0.5; }

        .result-section-title {
            padding: 14px 18px 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.15s;
        }

        .result-item:last-child { border-bottom: none; }
        .result-item:hover  { background: var(--search-item-hover); }
        .result-item:active { background: var(--poll-voted-bg); }

        .result-poster {
            width: 48px; height: 70px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--border-color);
        }

        .result-poster-ph {
            width: 48px; height: 70px;
            border-radius: 8px;
            background: var(--border-color);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .result-avatar-img {
            width: 50px; height: 50px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--border-color);
        }

        .result-avatar-ph {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .result-info { flex: 1; min-width: 0; }

        .result-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }

        .result-rating {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(217,119,87,0.15);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .result-chevron { color: var(--text-muted); flex-shrink: 0; }

        /* ─── Poll Bubble ─── */
        .poll-bubble {
            max-width: 88%;
            background: var(--poll-bg);
            border: 1px solid var(--poll-border);
            border-radius: 16px;
            overflow: hidden;
        }

        .poll-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--poll-border); }

        .poll-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(135deg, #d97757, #b85c3c);
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .poll-poster-row { display: flex; gap: 12px; align-items: flex-start; }

        .poll-poster {
            width: 54px; height: 78px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .poll-poster-ph {
            width: 54px; height: 78px;
            border-radius: 8px;
            background: var(--border-color);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .poll-actor-img {
            width: 54px; height: 54px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .poll-actor-ph {
            width: 54px; height: 54px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .poll-info { flex: 1; min-width: 0; }

        .poll-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .poll-rating {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(217,119,87,0.15);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .poll-year { font-size: 12px; color: var(--text-muted); }

        .poll-question {
            padding: 10px 14px 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .poll-options { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }

        .poll-option {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 11px;
            border-radius: 10px;
            background: var(--poll-option-bg);
            border: 1.5px solid var(--poll-border);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .poll-option:hover   { background: var(--poll-option-hover); border-color: var(--accent); }
        .poll-option.my-vote { background: rgba(217,119,87,0.18); border-color: var(--accent); }

        .poll-option-fill {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            background: rgba(217,119,87,0.1);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .poll-tier {
            font-size: 12px;
            font-weight: 800;
            min-width: 26px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .tier-s { color: #ff6b35; }
        .tier-a { color: #ff9500; }
        .tier-b { color: #30d158; }
        .tier-c { color: #0a84ff; }
        .tier-d { color: #bf5af2; }
        .tier-f { color: #ff453a; }

        .poll-tier-label {
            flex: 1;
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .poll-pct {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            position: relative;
            z-index: 1;
            min-width: 30px;
            text-align: right;
        }

        .poll-footer {
            padding: 6px 14px 12px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }

        /* ─── Scrollbars ─── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
    </style>
</head>

<body>

<!-- Login Modal -->
<div class="login-modal" id="loginModal">
    <div class="login-box">
        <div class="login-logo">

<script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import {
        getDatabase, ref, push, onChildAdded, serverTimestamp,
        onValue, onDisconnect, set, remove, get
    } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

    /* ── Firebase init ── */
    const app = initializeApp({
        apiKey:            "AIzaSyDVAgkpOFYoVqfs0QhQKPvNOefJ6yYCKPU",
        authDomain:        "assemble-ab9ca.firebaseapp.com",
        databaseURL:       "https://assemble-ab9ca-default-rtdb.firebaseio.com",
        projectId:         "assemble-ab9ca",
        storageBucket:     "assemble-ab9ca.firebasestorage.app",
        messagingSenderId: "459627152005",
        appId:             "1:459627152005:web:997d0ac8304fca447b9fec"
    });

    const db          = getDatabase(app);
    const messagesRef = ref(db, 'messages');
    const onlineRef   = ref(db, 'onlineUsers');

    /* ── TMDB ── */
    const TMDB_KEY  = 'd971d4b212180c43e0830d20c04a68b5';
    const TMDB_BASE = 'https://api.themoviedb.org/3';
    const TMDB_IMG  = 'https://image.tmdb.org/t/p/w185';

    /* ── Tier config ── */
    const TIERS = [
        { id:'s', label:'S-Tier', cls:'tier-s' },
        { id:'a', label:'A-Tier', cls:'tier-a' },
        { id:'b', label:'B-Tier', cls:'tier-b' },
        { id:'c', label:'C-Tier', cls:'tier-c' },
        { id:'d', label:'D-Tier', cls:'tier-d' },
        { id:'f', label:'F-Tier', cls:'tier-f' },
    ];

    /* ── App state ── */
    let currentUser = null;
    let deletedMsgs = new Set();
    let loadedMsgs  = new Set();
    let currentTab  = 'movie';

    /* ── Helpers ── */
    function esc(t = '') {
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    }

    function scrollBottom() {
        const c = document.getElementById('chatContainer');
        requestAnimationFrame(() => c.scrollTop = c.scrollHeight);
    }

    function getTime() {
        return new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
    }

    /* ── Bootstrap saved state ── */
    (function init() {
        const dm = localStorage.getItem('deletedMessages');
        if (dm) deletedMsgs = new Set(JSON.parse(dm));

        const cu = localStorage.getItem('currentUser');
        if (cu) {
            currentUser = JSON.parse(cu);
            goOnline();
            document.getElementById('loginModal').classList.add('hidden');
        }
    })();

    function saveDel() {
        localStorage.setItem('deletedMessages', JSON.stringify([...deletedMsgs]));
    }

    function goOnline() {
        if (!currentUser) return;
        const r = ref(db, `onlineUsers/${currentUser.id}`);
        set(r, { name: currentUser.name, ts: serverTimestamp() });
        onDisconnect(r).remove();
    }

    /* ── Login / Logout ── */
    window.login = function () {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return;
        currentUser = { name, id: Date.now().toString() };
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        goOnline();
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('messageInput').focus();
    };

    window.logout = function () {
        if (!confirm('Leave the chat?')) return;
        if (currentUser) remove(ref(db, `onlineUsers/${currentUser.id}`));
        currentUser = null;
        localStorage.removeItem('currentUser');
        document.getElementById('loginModal').classList.remove('hidden');
        document.getElementById('nameInput').value = '';
        closeSidebar();
    };

    window.clearMyChat = function () {
        if (!confirm('Clear your chat view?')) return;
        document.getElementById('chatContainer').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                    </svg>
                </div>
                <div class="empty-text">Chat cleared!</div>
            </div>`;
        loadedMsgs.clear();
        closeSidebar();
    };

    /* ── Sidebar ── */
    window.toggleSettings = function () {
        if (currentUser) document.getElementById('sidebarName').textContent = currentUser.name;
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
    };

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
    }

    /* ── Online count ── */
    onValue(onlineRef, snap => {
        const n = snap.val() ? Object.keys(snap.val()).length : 0;
        document.getElementById('sidebarOnlineCount').textContent = `${n} online`;
    });

    /* ── Chat input ── */
    const msgInput = document.getElementById('messageInput');

    msgInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    document.getElementById('nameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });

    /* ── Send text message ── */
    window.sendMessage = async function () {
        if (!currentUser) { alert('Please login first'); return; }
        const txt = msgInput.value.trim();
        if (!txt) return;
        await push(messagesRef, {
            type: 'text',
            text: txt,
            sender: currentUser.name,
            senderId: currentUser.id,
            timestamp: serverTimestamp()
        });
        msgInput.value = '';
        msgInput.style.height = 'auto';
    };

    /* ── Search modal open / close ── */
    window.openSearch = function () {
        if (!currentUser) { alert('Please login first'); return; }
        document.getElementById('searchModal').classList.add('open');
        setTimeout(() => document.getElementById('searchInput').focus(), 400);
    };

    window.closeSearch = function () {
        document.getElementById('searchModal').classList.remove('open');
    };

    /* Close on backdrop tap */
    document.getElementById('searchModal').addEventListener('click', function (e) {
        if (e.target === this) closeSearch();
    });

    /* ── Tab switching ── */
    window.setTab = function (tab, btn) {
        currentTab = tab;
        document.querySelectorAll('.search-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        /* Only re-search if results are already displayed */
        const q = document.getElementById('searchInput').value.trim();
        if (q.length >= 2 && document.querySelector('.result-item')) {
            doSearch(q);
        }
    };

    /* ── Search input – show/hide clear button only, NO auto-search ── */
    const si = document.getElementById('searchInput');
    const cb = document.getElementById('clearBtn');

    si.addEventListener('input', function () {
        cb.style.display = this.value ? 'block' : 'none';
    });

    /* ── Fire search on Enter / Search key ── */
    si.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const q = this.value.trim();
            if (q.length < 2) {
                showEmpty('Type at least 2 characters to search');
                return;
            }
            doSearch(q);
            this.blur(); /* dismiss mobile keyboard */
        }
    });

    window.clearSearch = function () {
        si.value = '';
        cb.style.display = 'none';
        showEmpty();
        si.focus();
    };

    /* ── Result display helpers ── */
    function showEmpty(msg = 'Search for something to rate!') {
        document.getElementById('searchResults').innerHTML = `
            <div class="search-empty">
                <div class="search-empty-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </div>
                <div>${msg}</div>
            </div>`;
    }

    function showLoading() {
        document.getElementById('searchResults').innerHTML =
            `<div class="search-loading"><div class="search-spinner"></div><div>Searching…</div></div>`;
    }

    /* ── TMDB fetch ── */
    async function doSearch(q) {
        showLoading();
        try {
            const res  = await fetch(`${TMDB_BASE}/search/${currentTab}?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}`);
            if (!res.ok) throw new Error('API error');
            const data = await res.json();
            renderResults(data.results || [], q);
        } catch {
            document.getElementById('searchResults').innerHTML = `
                <div class="search-empty">
                    <div class="search-empty-icon">⚠️</div>
                    <div>Search failed. Check your connection and try again.</div>
                </div>`;
        }
    }

    /* ── Render result list ── */
    function renderResults(list, q) {
        const el = document.getElementById('searchResults');

        if (!list.length) {
            el.innerHTML = `
                <div class="search-empty">
                    <div class="search-empty-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </div>
                    <div>No results for "<strong>${esc(q)}</strong>"</div>
                </div>`;
            return;
        }

        const isPerson = currentTab === 'person';
        const label    = currentTab === 'movie' ? 'Movies' : currentTab === 'tv' ? 'TV Shows' : 'Actors';
        let html = `<div class="result-section-title">${label}</div>`;

        list.slice(0, 15).forEach(item => {
            const payload = JSON.stringify(JSON.stringify(pick(item)));

            if (isPerson) {
                const img      = item.profile_path ? `${TMDB_IMG}${item.profile_path}` : null;
                const dept     = esc(item.known_for_department || 'Actor');
                const knownFor = (item.known_for || []).map(k => k.title || k.name).slice(0, 2).join(', ');

                html += `
                    <div class="result-item" onclick='sendPoll(${payload})'>
                        ${img
                            ? `<img class="result-avatar-img" src="${img}" alt=""
                                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                            : ''}
                        <div class="result-avatar-ph" ${img ? 'style="display:none"' : ''}>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                        <div class="result-info">
                            <div class="result-title">${esc(item.name || '')}</div>
                            <div class="result-meta">${dept}${knownFor ? ' · ' + esc(knownFor) : ''}</div>
                        </div>
                        <div class="result-chevron">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </div>
                    </div>`;
            } else {
                const title  = esc(item.title || item.name || 'Unknown');
                const year   = (item.release_date || item.first_air_date || '').slice(0, 4);
                const rating = item.vote_average ? item.vote_average.toFixed(1) : null;
                const img    = item.poster_path ? `${TMDB_IMG}${item.poster_path}` : null;

                html += `
                    <div class="result-item" onclick='sendPoll(${payload})'>
                        ${img
                            ? `<img class="result-poster" src="${img}" alt=""
                                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                            : ''}
                        <div class="result-poster-ph" ${img ? 'style="display:none"' : ''}>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="2" width="20" height="20" rx="2"/>
                                <line x1="7"  y1="2"  x2="7"  y2="22"/>
                                <line x1="17" y1="2"  x2="17" y2="22"/>
                                <line x1="2"  y1="12" x2="22" y2="12"/>
                            </svg>
                        </div>
                        <div class="result-info">
                            <div class="result-title">${title}</div>
                            <div class="result-meta">${year ? year + ' · ' : ''}${currentTab === 'movie' ? 'Movie' : 'TV Show'}</div>
                            ${rating ? `
                            <div class="result-rating">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="#d97757">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                                ${rating}
                            </div>` : ''}
                        </div>
                        <div class="result-chevron">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </div>
                    </div>`;
            }
        });

        el.innerHTML = html;
    }

    /* ── Sanitise item for storage ── */
    function pick(item) {
        if (currentTab === 'person') {
            return {
                kind:         'person',
                id:           item.id,
                name:         item.name || '',
                dept:         item.known_for_department || 'Actor',
                profile_path: item.profile_path || null,
                knownFor:     (item.known_for || []).map(k => k.title || k.name).slice(0, 3)
            };
        }
        return {
            kind:        currentTab,
            id:          item.id,
            title:       item.title || item.name || '',
            year:        (item.release_date || item.first_air_date || '').slice(0, 4),
            rating:      item.vote_average || 0,
            poster_path: item.poster_path || null
        };
    }

    /* ── Send poll to Firebase ── */
    window.sendPoll = async function (jsonStr) {
        if (!currentUser) return;
        const item = JSON.parse(jsonStr);
        closeSearch();
        await push(messagesRef, {
            type:      'poll',
            sender:    currentUser.name,
            senderId:  currentUser.id,
            timestamp: serverTimestamp(),
            item,
            votes:     {}
        });
    };

    /* ── Vote on a poll ── */
    window.votePoll = async function (msgId, tierId) {
        if (!currentUser) { alert('Login to vote'); return; }
        const vRef = ref(db, `messages/${msgId}/votes/${currentUser.id}`);
        const snap = await get(vRef);
        /* toggle off if already voted same tier */
        if (snap.exists() && snap.val() === tierId) await remove(vRef);
        else await set(vRef, tierId);
    };

    /* ── Delete own message (local) ── */
    window.deleteMessage = function (id) {
        deletedMsgs.add(id);
        saveDel();
        const el = document.querySelector(`[data-msg-id="${id}"]`);
        if (el) { el.classList.add('deleted'); setTimeout(() => el.remove(), 300); }
    };

    /* ── Firebase real-time listener ── */
    onChildAdded(messagesRef, snap => {
        if (!currentUser) return;
        const data = snap.val();
        const id   = snap.key;
        if (deletedMsgs.has(id) || loadedMsgs.has(id)) return;
        loadedMsgs.add(id);

        const container = document.getElementById('chatContainer');
        const empty = container.querySelector('.empty-state');
        if (empty) empty.remove();

        const isOwn = data.senderId === currentUser.id;
        if (data.type === 'poll') renderPoll(container, id, data, isOwn);
        else                      renderText(container, id, data, isOwn);
    });

    /* ── Render plain text bubble ── */
    function renderText(container, id, data, isOwn) {
        const el   = document.createElement('div');
        el.className = `message-group ${isOwn ? 'own' : ''}`;
        el.setAttribute('data-msg-id', id);
        const init = (data.sender || '?')[0].toUpperCase();

        el.innerHTML = `
            ${isOwn ? `
            <div class="message-actions">
                <button class="delete-btn" onclick="deleteMessage('${id}')">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                    </svg>
                    Delete
                </button>
            </div>` : ''}
            <div class="message-header">
                <div class="avatar ${isOwn ? 'user-avatar' : 'friend-avatar'}">${init}</div>
                <span class="sender-name">${esc(data.sender)}</span>
                <span class="message-time">${getTime()}</span>
            </div>
            <div class="message-bubble ${isOwn ? '' : 'friend'}">${esc(data.text || '')}</div>`;

        container.appendChild(el);
        scrollBottom();
    }

    /* ── Render poll bubble ── */
    function renderPoll(container, id, data, isOwn) {
        const item     = data.item || {};
        const isPerson = item.kind === 'person';
        const title    = esc(item.name || item.title || 'Unknown');
        const imgPath  = item.poster_path || item.profile_path || null;
        const imgSrc   = imgPath ? `${TMDB_IMG}${imgPath}` : null;

        const personImgHtml = imgSrc
            ? `<img class="poll-actor-img" src="${imgSrc}" alt=""
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
               <div class="poll-actor-ph" style="display:none">
                   <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
                       <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                       <circle cx="12" cy="7" r="4"/>
                   </svg>
               </div>`
            : `<div class="poll-actor-ph">
                   <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
                       <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                       <circle cx="12" cy="7" r="4"/>
                   </svg>
               </div>`;

        const mediaImgHtml = imgSrc
            ? `<img class="poll-poster" src="${imgSrc}" alt=""
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
               <div class="poll-poster-ph" style="display:none">
                   <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round">
                       <rect x="2" y="2" width="20" height="20" rx="2"/>
                   </svg>
               </div>`
            : `<div class="poll-poster-ph">
                   <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round">
                       <rect x="2" y="2" width="20" height="20" rx="2"/>
                   </svg>
               </div>`;

        const el   = document.createElement('div');
        el.className = `message-group ${isOwn ? 'own' : ''}`;
        el.setAttribute('data-msg-id', id);
        el.setAttribute('data-poll', '1');

        const init   = (data.sender || '?')[0].toUpperCase();
        const votes  = data.votes || {};
        const myVote = currentUser ? votes[currentUser.id] : null;
        const total  = Object.keys(votes).length;

        el.innerHTML = `
            <div class="message-header">
                <div class="avatar ${isOwn ? 'user-avatar' : 'friend-avatar'}">${init}</div>
                <span class="sender-name">${esc(data.sender)}</span>
                <span class="message-time">${getTime()}</span>
            </div>
            <div class="poll-bubble">
                <div class="poll-header">
                    <div class="poll-badge">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="white">
                            <path d="M18 20V10M12 20V4M6 20v-6"/>
                        </svg>
                        Rate It!
                    </div>
                    <div class="poll-poster-row">
                        ${isPerson ? personImgHtml : mediaImgHtml}
                        <div class="poll-info">
                            <div class="poll-title">${title}</div>
                            ${item.rating ? `
                            <div class="poll-rating">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="#d97757">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                                ${Number(item.rating).toFixed(1)}/10
                            </div>` : ''}
                            ${item.year ? `<div class="poll-year">${esc(item.year)}</div>` : ''}
                            ${isPerson && item.dept ? `<div class="poll-year">${esc(item.dept)}</div>` : ''}
                        </div>
                    </div>
                </div>
                <div class="poll-question">How would you rate it?</div>
                <div class="poll-options" id="opts-${id}">${buildOptions(id, votes, myVote, total)}</div>
                <div class="poll-footer"  id="foot-${id}">${footerText(total)}</div>
            </div>`;

        container.appendChild(el);
        scrollBottom();

        /* Live vote sync */
        const votesRef = ref(db, `messages/${id}/votes`);
        onValue(votesRef, snap => {
            const lv = snap.val() || {};
            const mv = currentUser ? lv[currentUser.id] : null;
            const tt = Object.keys(lv).length;
            const optsEl = document.getElementById(`opts-${id}`);
            const footEl = document.getElementById(`foot-${id}`);
            if (optsEl) optsEl.innerHTML = buildOptions(id, lv, mv, tt);
            if (footEl) footEl.textContent = footerText(tt);
        });
    }

    /* ── Build poll option rows ── */
    function buildOptions(msgId, votes, myVote, total) {
        return TIERS.map(t => {
            const cnt = Object.values(votes).filter(v => v === t.id).length;
            const pct = total > 0 ? Math.round((cnt / total) * 100) : 0;
            return `
                <div class="poll-option ${myVote === t.id ? 'my-vote' : ''}"
                     onclick="votePoll('${msgId}','${t.id}')">
                    <div class="poll-option-fill" style="width:${pct}%"></div>
                    <span class="poll-tier ${t.cls}">${t.id.toUpperCase()}</span>
                    <span class="poll-tier-label">${t.label}</span>
                    <span class="poll-pct">${total > 0 ? pct + '%' : ''}</span>
                </div>`;
        }).join('');
    }

    function footerText(total) {
        return total === 0 ? 'Be the first to vote!' : `${total} vote${total !== 1 ? 's' : ''}`;
    }

    /* ── Prevent double-tap zoom on mobile ── */
    let lt = 0;
    document.addEventListener('touchend', e => {
        const n = Date.now();
        if (n - lt <= 300) e.preventDefault();
        lt = n;
    }, false);
</script>

</body>
</html>
